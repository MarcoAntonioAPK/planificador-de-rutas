<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Planifica rutas de transporte y evita áreas restringidas.">
    <title>RouteFlow | Planificador de rutas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
    <header class="app-header">
        <a class="brand" href="index.html" aria-label="RouteFlow, inicio">
            <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-route"></i></span>
            <strong>RouteFlow</strong>
        </a>
        <div class="header-actions">
            <span class="connection-status"><span class="live-dot"></span> En línea</span>
            <a class="user-link" href="login.html"><i class="fa-regular fa-user"></i><span>Iniciar sesión</span></a>
            <button class="icon-button mobile-menu" id="sidebarToggle" type="button" aria-label="Mostrar planificación" aria-controls="sidebar" aria-expanded="false"><i class="fa-solid fa-sliders"></i></button>
        </div>
    </header>

    <main class="workspace">
        <aside class="planner-panel" id="sidebar" aria-label="Configuración de ruta">
            <div class="panel-heading">
                <span class="eyebrow">Planificador</span>
                <h1>Nueva ruta</h1>
                <p>Introduce los puntos y marca las zonas que deseas evitar.</p>
            </div>

            <form id="routeForm" novalidate>
                <section class="form-section" aria-labelledby="route-points-title">
                    <h2 id="route-points-title">Trayecto</h2>
                    <div class="route-inputs">
                        <div class="field-group route-point--origin">
                            <label for="origenCoords">Origen</label>
                            <div class="input-shell"><span class="point-marker"></span><input type="text" id="origenCoords" value="40.4168, -3.7038" inputmode="decimal" autocomplete="off"><button class="input-action" type="button" data-use-location="origenCoords" aria-label="Usar ubicación actual"><i class="fa-solid fa-crosshairs"></i></button></div>
                        </div>
                        <div class="route-connector" aria-hidden="true"></div>
                        <div class="field-group route-point--destination">
                            <label for="destinoCoords">Destino</label>
                            <div class="input-shell"><span class="point-marker"></span><input type="text" id="destinoCoords" value="40.4379, -3.6795" inputmode="decimal" autocomplete="off"><button class="input-action" type="button" data-use-location="destinoCoords" aria-label="Usar ubicación actual"><i class="fa-solid fa-crosshairs"></i></button></div>
                        </div>
                    </div>
                </section>

                <section class="form-section" aria-labelledby="restrictions-title">
                    <div class="section-row"><div><h2 id="restrictions-title">Zonas a evitar</h2><p>Selecciona tres puntos en el mapa.</p></div><span class="count-badge" id="areaCount">0 áreas</span></div>
                    <button class="text-button" id="clearAreasBtn" type="button" disabled><i class="fa-regular fa-trash-can"></i> Limpiar selección</button>
                </section>

                <div class="form-actions">
                    <button class="primary-button" id="calculateRouteBtn" type="submit"><span>Calcular ruta</span><i class="fa-solid fa-arrow-right"></i></button>
                    <button class="secondary-button" id="recalculateRouteBtn" type="button"><i class="fa-solid fa-shuffle"></i><span>Evitar zonas</span></button>
                </div>
            </form>
        </aside>

        <section class="map-stage" aria-label="Mapa de planificación">
            <div id="map" role="application" aria-label="Mapa interactivo"></div>
            <button class="map-control-button" id="fitMapBtn" type="button" aria-label="Centrar ruta"><i class="fa-solid fa-expand"></i></button>
            <div class="route-summary" id="routeSummary" aria-live="polite">
                <div class="summary-icon"><i class="fa-solid fa-truck-fast"></i></div>
                <div class="summary-copy"><span>Ruta</span><strong id="routeDistance">Sin calcular</strong></div>
                <div class="summary-stat"><span>Duración</span><strong id="routeDuration">—</strong></div>
                <div class="summary-stat"><span>Estado</span><strong class="status-ok" id="routeStatus">Lista</strong></div>
            </div>
            <div class="toast" id="appToast" role="status" aria-live="polite"><i class="fa-solid fa-circle-check"></i><span></span></div>
        </section>
    </main>

    <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script><script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script><script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script><script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
    <script src="assets/js/ui.js" defer></script><script src="assets/js/map.js" defer></script>
</body>
</html>
