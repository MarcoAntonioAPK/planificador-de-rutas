<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Transporte de Carga</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="base.css">

    <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
    <script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
    <script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
    <script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
    <link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <button class="btn btn-link sidebar-toggle me-3" id="sidebarToggle">
                <i class="fas fa-bars text-primary"></i>
            </button>
            <a class="navbar-brand fw-bold text-primary" href="#">
                <i class="fas fa-truck me-2"></i>
                Planificador de rutas
            </a>
            <div class="ms-auto">
                <button class="btn btn-outline-primary btn-sm me-2" id="saveRouteBtn">
                    <i class="fas fa-save me-1"></i>
                    Guardar área reinstringida
                </button>
                <button class="btn btn-primary btn-sm" id="generatePdfBtn">
                    <i class="fas fa-file-pdf me-1"></i>
                    Generar PDF
                </button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <div class="card glass-card">
                    <div class="card-header bg-transparent border-0">
                        <h5 class="card-title text-primary mb-0">
                            <i class="fas fa-route me-2"></i>
                            Planificación de Ruta
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="routeForm">
                            <!-- Nuevos inputs para coordenadas -->
                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="fas fa-map-marker-alt me-2"></i>
                                    Coordenadas de Ruta
                                </h6>
                                <div class="mb-3">
                                    <label for="origenCoords" class="form-label">Origen (lat, lng)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">
                                            <i class="fas fa-play text-success"></i>
                                        </span>
                                        <input type="text" class="form-control" id="origenCoords" 
                                               placeholder="40.4168, -3.7038" value="40.4168, -3.7038">
                                    </div>
                                    <small class="form-text text-muted">Formato: latitud, longitud</small>
                                </div>
                                <div class="mb-3">
                                    <label for="destinoCoords" class="form-label">Destino (lat, lng)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">
                                            <i class="fas fa-flag text-danger"></i>
                                        </span>
                                        <input type="text" class="form-control" id="destinoCoords" 
                                               placeholder="40.4379, -3.6795" value="40.4379, -3.6795">
                                    </div>
                                    <small class="form-text text-muted">Formato: latitud, longitud</small>
                                </div>
                            </div>

                            <!-- Botones de Acción -->
                            <div class="form-actions">
                                <button class="btn btn-primary w-100 mb-2" onclick="calcularRuta(false)">
                                    <i class="fas fa-route me-2"></i>
                                    Calcular ruta propuesta
                                </button>
                                <button class="btn btn-primary w-100 mb-2" onclick="calcularRuta(true)">
                                    <i class="fas fa-route me-2"></i>
                                    Recalcular ruta
                                </button>
                                <button class="btn btn-outline-secondary w-100" onclick="borrarTriangulos()">
                                    <i class="fas fa-eraser me-2"></i>
                                    Borrar áreas reinstringidas
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Map Container -->
        <div class="map-container" id="mapContainer">
            <div id="contenedo_mapa"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script src="animacion.js"></script>
    <script src="mapa.js"></script>
</body>
</html>
