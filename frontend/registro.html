<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Registro | Planificador de rutas</title><link rel="stylesheet" href="assets/css/app.css"><link rel="stylesheet" href="assets/css/login.css"></head><body class="auth-page"><main class="auth-shell"><a class="brand auth-brand" href="index.html"><span class="brand-mark">↗</span><strong>Planificador de rutas</strong></a><section class="auth-card"><div class="auth-heading"><span class="eyebrow">Nueva cuenta</span><h1>Empieza a planificar</h1><p>Tu cuenta siempre quedará ligada a una empresa.</p></div><form id="registerForm"><div class="auth-field"><label for="name">Nombre completo</label><input id="name" name="name" autocomplete="name" required></div><div class="auth-field"><label for="phone">Número de teléfono</label><input id="phone" name="phone" type="tel" autocomplete="tel" required></div><div class="auth-field"><label for="email">Correo</label><input id="email" name="email" type="email" autocomplete="email" required></div><div class="form-grid"><div class="auth-field"><label for="companyId">Empresa</label><select id="companyId" name="companyId" required><option value="1">Salzillo</option><option value="2">Transportes</option></select></div><div class="auth-field"><label for="role">Perfil</label><select id="role" name="role" required><option value="planner">Planificador</option><option value="driver">Chofer</option></select></div></div><div class="auth-field"><label for="password">Contraseña</label><input id="password" name="password" type="password" autocomplete="new-password" minlength="10" required></div><p class="form-message" id="formMessage" role="alert"></p><button class="primary-button auth-submit"><span>Crear cuenta</span><span>→</span></button></form><p class="auth-footer">Ya tengo cuenta. <a href="login.html">Iniciar sesión</a></p></section></main><script src="assets/js/auth-forms.js" type="module"></script></body></html>
